<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Audio Tab Navigator</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header class="app-header">
    <div class="logo-area">
      <span class="logo-icon">🎵</span>
      <h1>Audio Tab Navigator</h1>
    </div>
    <button id="mute-all-button" class="header-action" type="button">
      <span class="header-action-icon" aria-hidden="true">🔇</span>
      <span data-i18n="muteAllTabs">すべてミュート</span>
    </button>
  </header>
  <main id="tab-list-container">
    <section class="tab-section">
      <h2 class="section-title" data-i18n="sectionActive">再生中</h2>
      <div id="active-empty-message" class="empty-message hidden" data-i18n="emptyActive">現在、音声を出力しているタブはありません</div>
      <ul id="active-tab-list" class="tab-list"></ul>
    </section>

    <section class="tab-section">
      <h2 class="section-title" data-i18n="sectionHistory">最近再生したタブ (最大5件)</h2>
      <div id="history-empty-message" class="empty-message hidden" data-i18n="emptyHistory">履歴はありません</div>
      <ul id="history-tab-list" class="tab-list"></ul>
    </section>
  </main>
  <footer class="popup-footer">
    <div class="shortcut-container">
      <div id="shortcut-warning-area" class="shortcut-warning hidden" role="alert">
        <span class="warning-icon" aria-hidden="true">⚠️</span>
        <span data-i18n="shortcutConflictWarning">ショートカットの競合が検出されました。他の拡張機能と衝突している可能性があります。</span>
      </div>
      <div class="shortcut-row">
        <span id="shortcut-status-text" class="shortcut-status-text"></span>
        <button id="shortcut-settings-button" type="button" class="shortcut-settings-button">
          <span id="shortcut-button-text" data-i18n="changeShortcut">変更</span>
        </button>
      </div>
      <div id="shortcut-instructions-panel" class="shortcut-instructions hidden">
        <p id="shortcut-instructions-text" data-i18n="shortcutInstructionsChrome">アドレスバーで chrome://extensions/shortcuts を開き、Audio Tab Navigatorのショートカットを変更してください。</p>
      </div>
    </div>
  </footer>
  <div id="status-message" class="sr-only" role="status" aria-live="polite" aria-atomic="true"></div>
  <script src="popup.js"></script>
</body>
</html>
